version: '3.8'

services:
  backend:
    build: ./backend
    container_name: novelforge-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ${BACKEND_DATA_PATH:-./backend/data}:/app/data
    environment:
      - NOVELFORGE_DB_PATH=/app/data/novelforge.db
      - KNOWLEDGE_GRAPH_PROVIDER=${KNOWLEDGE_GRAPH_PROVIDER:-neo4j}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-12345678}
      - CORS_ORIGINS=*
      - BOOTSTRAP_OVERWRITE=${BOOTSTRAP_OVERWRITE:-true}
    depends_on:
      - neo4j
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=${VITE_BACKEND_URL:-}
    container_name: novelforge-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  neo4j:
    image: neo4j:2026.01.4
    container_name: novelforge-neo4j
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - ${NEO4J_DATA_PATH:-neo4j_data}:/data
      - ${NEO4J_LOGS_PATH:-neo4j_logs}:/logs
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-12345678}
      - NEO4J_PLUGINS=["apoc"]
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
